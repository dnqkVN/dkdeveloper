<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tooltraffic</title>

<link rel="stylesheet" href="main.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    background: linear-gradient(270deg, red, blue, green, purple);
    background-size: 836% 836%;
    animation: rgbBG 20s ease infinite;
}

@keyframes rgbBG {
    0% { background-position: 0% 36%; }
    36% { background-position: 80% 36%; }
    100% { background-position: 0% 36%; }
}

.header {
    text-align: center;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 0 0 10px #fff;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 20px;
}

.box {
    background: rgba(0,0,0,0.4);
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(255,255,255,0.3);
}

.box:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #fff, 0 0 40px #0ff;
}

#search {
    width: 90%;
    margin: 10px auto;
    display: block;
    padding: 10px;
    border-radius: 10px;
    border: none;
    text-align: center;
}
</style>
</head>

<body>

<div class="header">quin Developer</div>

<input type="text" id="search" placeholder="🔍 Tìm nhanh...">

<div class="grid" id="grid"></div>

<script>

// 🔥 Domain dùng site:
let useSiteList = [

"n188-n188.site",
"when.it.com",

];

// 🔥 Hàm search
function searchGoogle(domain) {
    domain = domain.trim();

    let keyword = useSiteList.includes(domain)
        ? "site:" + domain + " " + domain
        : domain;

    let url = "https://www.google.com/search?q=" + encodeURIComponent(keyword);
    window.location.href = url;
}

// 🔥 Render box
let grid = document.getElementById("grid");

links.forEach(name => {
    let div = document.createElement("div");
    div.className = "box";
    div.innerText = name;

    div.onclick = () => {
        searchGoogle(name.trim());
    };

    grid.appendChild(div);
});

// 🔍 Search filter
let search = document.getElementById("search");

search.addEventListener("input", () => {
    let keyword = search.value.toLowerCase().trim();
    let boxes = document.querySelectorAll(".box");

    boxes.forEach(box => {
        let text = box.innerText.toLowerCase();
        box.style.display = text.includes(keyword) ? "" : "none";
    });
});

</script>
