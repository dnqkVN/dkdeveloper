<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirect Admin</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

.box{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#334155;
    color:white;
}

button{
    margin-top:10px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    color:black;
    font-weight:bold;
}

pre{
    background:#020617;
    padding:15px;
    border-radius:10px;
    overflow:auto;
    margin-top:15px;
}
</style>
</head>
<body>

<h1>Redirect Admin</h1>

<div class="box">

<input id="key" placeholder="VD: 97-2">

<input id="domain" placeholder="VD: open882.net">

<button onclick="saveData()">Lưu</button>

<pre id="view"></pre>

</div>

<script>

let redirectMap =
    JSON.parse(localStorage.getItem("redirectMap")) || {};

function render(){

    document.getElementById("view").textContent =
        JSON.stringify(redirectMap,null,4);

}

render();

function saveData(){

    const key =
        document.getElementById("key").value.trim();

    const domain =
        document.getElementById("domain").value.trim();

    if(!key || !domain){

        alert("Nhập thiếu");

        return;

    }

    redirectMap[key] = domain;

    localStorage.setItem(
        "redirectMap",
        JSON.stringify(redirectMap)
    );

    render();

}

</script>

</body>
</html>
