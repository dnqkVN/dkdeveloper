<script type="module">
  function maskEmail(email) {
    let [name, domain] = email.split("@");

    if (name.length <= 3) {
        name = name[0] + "***";
    } else {
        name = name.slice(0, 3) + "***";
    }

    return name + "@" + domain;
}

window.loginGoogle = async function() {

        await setPersistence(auth, browserLocalPersistence);

function handleUser(user){
    if (allowedEmails.includes(user.email)) {

        currentUserEmail = user.email; // ✅ LƯU EMAIL
        document.getElementById("name").value = userNames[user.email] || user.email; // ✅ HIỆN LÊN

        document.getElementById("mainUI").style.display = "block";
        renderLinks();
        cleanOldMessages();

        fetch("https://api.ipify.org?format=json")

        .then(data=>{
            push(ref(db,"logs"),{
                email: user.email,

            });
        });

    } else {
        alert("ban khong co quyen");

}

onAuthStateChanged(auth, (user) => {
    if (user) handleUser(user);
    else document.getElementById("loginUI").style.display = "flex";
});

// CHAT
window.sendMsg = function(){
    let msg = document.getElementById("msg").value;

    if(!msg) return;
    if(!currentUserEmail) return alert("Chưa đăng nhập");

    push(ref(db,"chat"),{
        name: currentUserEmail, // ✅ EMAIL
        msg: msg,
        time:new Date().toLocaleTimeString(),
        timestamp: Date.now()
    });

    document.getElementById("msg").value="";
    cleanOldMessages();
};

onChildAdded(ref(db,"chat"),snap=>{
    let m=snap.val();
    let div=document.createElement("div");
    let displayName = userNames[m.name] || maskEmail(m.name);
div.innerHTML=`<b>${displayName}</b>: ${m.msg} (${m.time})`;
    document.getElementById("messages").appendChild(div);
});

// AUTO XOÁ
const MAX_TIME = 24 * 60 * 60 * 1000;

function cleanOldMessages() {
    const now = Date.now();
    get(ref(db, "chat")).then(snapshot => {
        snapshot.forEach(child => {
            let data = child.val();
            if (data.timestamp && (now - data.timestamp > MAX_TIME)) {
                remove(ref(db, "chat/" + child.key));
            }
        });
    });
}

// COUNTDOWN
function updateCountdown() {
    const now = Date.now();
    const el = document.getElementById("countdown");

    get(ref(db, "chat")).then(snapshot => {
        let oldest = Infinity;

        snapshot.forEach(child => {
            let d = child.val();
            if (d.timestamp && d.timestamp < oldest) {
                oldest = d.timestamp;
            }
        });

        if (oldest === Infinity) {
            el.innerText = "(Chat tổng sẽ xóa sau 24h)";
            return;
        }

        let left = (oldest + MAX_TIME) - now;

        if (left <= 0) {
            el.innerText = "(đang xoá..)";
            return;
        }

        let seconds = Math.floor(left / 1000);  let h = Math.floor(seconds / 3600); let m = Math.floor((seconds % 3600) / 60); let s = seconds % 60;  el.innerText = `(${h}h ${m}m ${s}s)`;
    });
}

setInterval(updateCountdown, 1000);
setInterval(cleanOldMessages, 5000);

cleanOldMessages();
</script>
