<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirect Manager</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    padding:20px;
}

h1{
    color:#38bdf8;
}

.box{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#334155;
    color:white;
}

button{
    margin-top:10px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

pre{
    background:#020617;
    padding:15px;
    border-radius:10px;
    overflow:auto;
    margin-top:15px;
}
</style>
</head>
<body>

<h1>Redirect Manager</h1>

<div class="box">
    <input type="text" id="key" placeholder="VD: 1-2">
    <input type="text" id="domain" placeholder="VD: example.com">

    <button onclick="addData()">Thêm</button>
    <button onclick="downloadJson()">Tải data.json</button>

    <pre id="output"></pre>
</div>

<script>
let redirectMap = {
    "1-2":"ok8386-mobi.com",
};

function render(){
    document.getElementById("output").textContent =
        JSON.stringify(redirectMap,null,4);
}

render();

function addData(){

    const key = document.getElementById("key").value.trim();
    const domain = document.getElementById("domain").value.trim();

    if(!key || !domain){
        alert("Nhập đầy đủ");
        return;
    }

    redirectMap[key] = domain;

    render();

    document.getElementById("key").value = "";
    document.getElementById("domain").value = "";
}

function downloadJson(){

    const blob = new Blob(
        [JSON.stringify(redirectMap,null,4)],
        {type:"application/json"}
    );

    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);

    a.download = "data.json";

    a.click();
}
</script>

</body>
</html>
