.header { text-align: center; padding: 20px; font-size: 26px; font-weight: bold; background: rgba(255,255,255,0.1); border-radius: 15px; margin: 0 15px; }

.box:hover {

#chatBox input { padding: 10px; border-radius: 10px; border: none; background: rgba(255,255,255,0.9); }
#chatBox button { padding: 10px 18px; border-radius: 10px; border: none; background: #4facfe; color: white; font-weight: bold; cursor: pointer; }
#messages { max-height: 250px; overflow-y: auto; margin-top: 15px; font-size: 14px; }
#messages div { margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, get, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, setPersistence, browserLocalPersistence, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = { apiKey: "AIzaSyCoGH-211UP_6o5eqoL4bq6DI4VbzXTKJ0", authDomain: "check-user-1.firebaseapp.com", projectId: "check-user-1" };
const app = initializeApp(firebaseConfig); 
const db = getDatabase(app); 
const auth = getAuth(app); 
const provider = new GoogleAuthProvider();

function maskEmail(e){let[n,d]=e.split("@");return(n.length<=3?n[0]+"***":n.slice(0,3)+"***")+"@"+d;}

let currentUserEmail = "";
const userNames = {
    "qkhaang@gmail.com":"qk",
    "khangdoannq@gmail.com":"kdoan",
    "truongloi010220@gmail.com":"phát béo",
    "anddang15@gmail.com":"an",
    "truonghuuphat9991@gmail.com":"lọ dùm trai 6 múi",
    "anhkhoadn2009@gmail.com":"khoa",
    "tmai28298@gmail.com":"tmai",
    "12345vanthach@gmail.com":"nam"
};
const allowedEmails = Object.keys(userNames);
const MAX_TIME = 24 * 60 * 60 * 1000;

// LOGOUT MODAL LOGIC
window.openLogoutModal = () => document.getElementById("logoutConfirmUI").style.display = "flex";
window.closeLogoutModal = () => document.getElementById("logoutConfirmUI").style.display = "none";
window.executeLogout = () => { 
    document.getElementById("logoutConfirmUI").style.display = "none"; 
    signOut(auth).then(()=>window.location.reload()); 
};

// LOGIN GOOGLE
window.loginGoogle = async () => { 
    try { 
        await setPersistence(auth, browserLocalPersistence); 
        await signInWithPopup(auth, provider); 
    } catch(e){ alert(e.message); } 
};

function handleUser(user){
    if(allowedEmails.includes(user.email)){
        currentUserEmail = user.email; 
        document.getElementById("name").value = userNames[user.email];
        document.getElementById("loginUI").style.display = "none"; 
        document.getElementById("mainUI").style.display = "block";
        renderLinks();
        // LOG IP
        fetch("https://api.ipify.org?format=json").then(r=>r.json()).then(d=>{ 
            push(ref(db,"logs"),{email:user.email, ip:d.ip, time:new Date().toLocaleString()}); 
        });
    } else { 
        alert("Không có quyền!"); 
        signOut(auth); 
    }
}

onAuthStateChanged(auth, u => {
    if(u) handleUser(u);
    else {
        document.getElementById("loginUI").style.display = "flex";
        document.getElementById("mainUI").style.display = "none";
    }
});

// CHAT LOGIC
window.sendMsg = () => {
    let msg = document.getElementById("msg").value; 
    if(!msg || !currentUserEmail) return;
    push(ref(db,"chat"),{
        name: currentUserEmail, 
        msg: msg, 
        time: new Date().toLocaleTimeString(), 
        timestamp: Date.now()
    });
    document.getElementById("msg").value="";
};

onChildAdded(ref(db,"chat"),s=>{
    let m = s.val(); 
    let div = document.createElement("div");
    div.innerHTML = `<b>${userNames[m.name]||maskEmail(m.name)}</b>: ${m.msg} <br><span style="font-size:11px;opacity:0.5;">${m.time}</span>`;
    document.getElementById("messages").appendChild(div); 
    document.getElementById("messages").scrollTop = 99999;
});

// AUTO CLEAN & COUNTDOWN
function cleanOldMessages() {
    const now = Date.now();
    get(ref(db, "chat")).then(snap => {
        snap.forEach(c => { 
            if(c.val().timestamp && (now - c.val().timestamp > MAX_TIME)) {
                remove(ref(db, "chat/"+c.key)); 
            }
        });
    });
}

function updateCountdown() {
    get(ref(db, "chat")).then(snap => {
        let oldest = Infinity; 
        snap.forEach(c => { if(c.val().timestamp < oldest) oldest = c.val().timestamp; });
        const el = document.getElementById("countdown");
        if(oldest === Infinity) { el.innerText = "(Tự xóa sau 24h)"; return; }
        let left = (oldest + MAX_TIME) - Date.now();
        if(left <= 0) { el.innerText = "(Đang dọn dẹp...)"; return; }
        let s = Math.floor(left/1000); 
        let h = Math.floor(s/3600); 
        let m = Math.floor((s%3600)/60);
        el.innerText = `(Xóa sau: ${h}h ${m}p ${s%60}s)`;
    });
}

setInterval(updateCountdown, 1000); 
setInterval(cleanOldMessages, 15000);
cleanOldMessages();
</script>
