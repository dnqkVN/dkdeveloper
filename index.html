const provider = new GoogleAuthProvider();

const allowedEmails = [
"qkhaang@gmail.com","truongloi010220@gmail.com","anddang15@gmail.com","anhkhoadn2009@gmail.com"

window.loginGoogle = async function() {
    try {
        await setPersistence(auth, browserLocalPersistence);
        const result = await signInWithPopup(auth, provider);
        handleUser(result.user);
    } catch (e) {
        alert(e.message);

};

function handleUser(user){
    if (allowedEmails.includes(user.email)) {
        document.getElementById("loginUI").style.display = "none";
        document.getElementById("mainUI").style.display = "block";
    } else {
        alert("ban khong co quyen");
        signOut(auth);
    }
}

onAuthStateChanged(auth, (user) => {
    if (user) {
        handleUser(user);
    } else {
        document.getElementById("loginUI").style.display = "flex";
    }
});

fetch("https://api.ipify.org?format=json")
.then(r=>r.json())
.then(data=>{
    push(ref(db,"logs"),{
        ip:data.ip,
        time:new Date().toLocaleString()
    });
});

window.sendMsg = function(){
    let name = document.getElementById("name").value || "Ẩn danh";
    let msg = document.getElementById("msg").value;
    if(!msg) return;

    push(ref(db,"chat"),{
        name,msg,
        time:new Date().toLocaleTimeString()
    });

    document.getElementById("msg").value="";
};

onChildAdded(ref(db,"chat"),snap=>{
    let m=snap.val();
    let div=document.createElement("div");
    div.innerHTML=`<b>${m.name}</b>: ${m.msg} (${m.time})`;
    document.getElementById("messages").appendChild(div);
});
</script>
