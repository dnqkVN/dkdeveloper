<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, get, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, setPersistence, browserLocalPersistence, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCoGH-211UP_6o5eqoL4bq6DI4VbzXTKJ0",
  authDomain: "check-user-1.firebaseapp.com",
  projectId: "check-user-1",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const allowedEmails = [
"qkhaang@gmail.com","truongloi010220@gmail.com","anddang15@gmail.com","anhkhoadn2009@gmail.com"
];

// LOGIN
window.loginGoogle = async function() {
    try {
        await setPersistence(auth, browserLocalPersistence);
        const result = await signInWithPopup(auth, provider);
        handleUser(result.user);
    } catch (e) {
        alert(e.message);
    }
};

function handleUser(user){
    if (allowedEmails.includes(user.email)) {
        document.getElementById("loginUI").style.display = "none";
        document.getElementById("mainUI").style.display = "block";
        renderLinks();
        cleanOldMessages();

        // ✅ THÊM LOG EMAIL + IP
        fetch("https://api.ipify.org?format=json")
        .then(r=>r.json())
        .then(data=>{
            push(ref(db,"logs"),{
                email: user.email,
                ip: data.ip,
                time: new Date().toLocaleString()
            });
        });

    } else {
        alert("ban khong co quyen");
        signOut(auth);
    }
}

onAuthStateChanged(auth, (user) => {
    if (user) handleUser(user);
    else document.getElementById("loginUI").style.display = "flex";
});

// CHAT
window.sendMsg = function(){
    let name = document.getElementById("name").value || "Ẩn danh";
    let msg = document.getElementById("msg").value;
    if(!msg) return;

    push(ref(db,"chat"),{
        name,
        msg,
        time:new Date().toLocaleTimeString(),
        timestamp: Date.now()
    });

    document.getElementById("msg").value="";
    cleanOldMessages();
};

onChildAdded(ref(db,"chat"),snap=>{
    let m=snap.val();
    let div=document.createElement("div");
    div.innerHTML=`<b>${m.name}</b>: ${m.msg} (${m.time})`;
    document.getElementById("messages").appendChild(div);
});

// AUTO XOÁ
const MAX_TIME = 24 * 60 * 60 * 1000; // 24 giờ

function cleanOldMessages() {
    const now = Date.now();
    get(ref(db, "chat")).then(snapshot => {
        snapshot.forEach(child => {
            let data = child.val();
            if (data.timestamp && (now - data.timestamp > MAX_TIME)) {
                remove(ref(db, "chat/" + child.key));
            }
        });
    });
}

// COUNTDOWN
function updateCountdown() {
    const now = Date.now();
    const el = document.getElementById("countdown");

    get(ref(db, "chat")).then(snapshot => {
        let oldest = Infinity;

        snapshot.forEach(child => {
            let d = child.val();
            if (d.timestamp && d.timestamp < oldest) {
                oldest = d.timestamp;
            }
        });

        if (oldest === Infinity) {
            el.innerText = "(Chat tổng sẽ xóa sau 24h)";
            return;
        }

        let left = (oldest + MAX_TIME) - now;

        if (left <= 0) {
            el.innerText = "(đang xoá..)";
            return;
        }

        el.innerText = `(${Math.floor(left/1000)}s)`;
    });
}

setInterval(updateCountdown, 1000);
setInterval(cleanOldMessages, 5000);

cleanOldMessages();
</script>
