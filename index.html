<script type="module">

function handleUser(user){

// CHAT
window.sendMsg = function(){
    let msg = document.getElementById("msg").value;

    if(!msg) return;
    if(!currentUserEmail) return alert("Chưa đăng nhập");

    push(ref(db,"chat"),{
        name: currentUserEmail,
        msg: msg,
        time:new Date().toLocaleTimeString(),
        timestamp: Date.now()
    });

    document.getElementById("msg").value="";
    cleanOldMessages();
};

onChildAdded(ref(db,"chat"),snap=>{
    let m=snap.val();
    let div=document.createElement("div");
    let displayName = userNames[m.name] || maskEmail(m.name);
    div.innerHTML=`<b style="color: #ffeb3b;">${displayName}</b>: ${m.msg} <span style="font-size:11px; opacity:0.6;">(${m.time})</span>`;
    let msgContainer = document.getElementById("messages");
    msgContainer.appendChild(div);
    // Tự động cuộn xuống tin nhắn mới nhất
    msgContainer.scrollTop = msgContainer.scrollHeight;
});

// AUTO XOÁ
const MAX_TIME = 24 * 60 * 60 * 1000;

function cleanOldMessages() {
    const now = Date.now();
    get(ref(db, "chat")).then(snapshot => {
        snapshot.forEach(child => {
            let data = child.val();
            if (data.timestamp && (now - data.timestamp > MAX_TIME)) {
                remove(ref(db, "chat/" + child.key));
            }
        });
    });
}

// COUNTDOWN
function updateCountdown() {
    const now = Date.now();
    const el = document.getElementById("countdown");

    get(ref(db, "chat")).then(snapshot => {
        let oldest = Infinity;

        snapshot.forEach(child => {
            let d = child.val();
            if (d.timestamp && d.timestamp < oldest) {
                oldest = d.timestamp;
            }
        });

        if (oldest === Infinity) {
            el.innerText = "(Tự động xóa sau 24h)";
            return;
        }

        let left = (oldest + MAX_TIME) - now;

        if (left <= 0) {
            el.innerText = "(đang xoá..)";
            return;
        }

        let seconds = Math.floor(left / 1000);  
        let h = Math.floor(seconds / 3600); 
        let m = Math.floor((seconds % 3600) / 60); 
        let s = seconds % 60;  
        el.innerText = `(${h}h ${m}p ${s}s)`;
    });
}

setInterval(updateCountdown, 1000);
setInterval(cleanOldMessages, 5000);

cleanOldMessages();
</script>
