<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tooltraffic</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    background: linear-gradient(180deg, #6fbaff, #b388ff);
}

.container {
    max-width: 900px;
    margin: auto;
}

.header {
    text-align: center;
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 0 0 10px #fff;
}

/* 🔥 ONLINE BOX */
#onlineBox {
    margin: 15px;
    padding: 15px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

#onlineList div {
    padding: 8px;
    margin: 5px 0;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
}

/* 🔥 hiệu ứng online */
.dot {
    height: 8px;
    width: 8px;
    background: lime;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    box-shadow: 0 0 6px lime;
}

</style>
</head>

<body>

<div class="container">

<div class="header">🔥 QUIN REALTIME SYSTEM</div>

<!-- 🔥 ONLINE -->
<div id="onlineBox">
<h3>🟢 Người đang online</h3>
<div id="onlineList"></div>
<p>👥 Tổng online: <b id="total">0</b></p>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, onValue, onDisconnect } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCoGH-211UP_6o5eqoL4bq6DI4VbzXTKJ0",
  authDomain: "check-user-1.firebaseapp.com",
  projectId: "check-user-1",
  storageBucket: "check-user-1.firebasestorage.app",
  messagingSenderId: "1009556670498",
  appId: "1:1009556670498:web:4df83dfa4b2314c21d227b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 MAP IP -> TÊN
const userMap = {
  "14.233.249.163": "admin",
  "27.67.24.105": "đỗ nguyên",
  "171.225.203.81": "đào tường",
  "115.76.50.219": "phát"
};

// detect device
let ua = navigator.userAgent;
let device = /android/i.test(ua) ? "Android" : "PC";

// 🔥 LẤY IP
fetch("https://api.ipify.org?format=json")
.then(res => res.json())
.then(data => {

    const ip = data.ip;
    const name = userMap[ip] || "khách";

    const userRef = ref(db, "online/" + ip);

    // ✅ set online
    set(userRef, {
        name: name,
        ip: ip,
        device: device,
        time: new Date().toLocaleTimeString()
    });

    // ✅ tự xoá khi thoát web
    onDisconnect(userRef).remove();
});

// 🔥 HIỂN THỊ REALTIME
const onlineList = document.getElementById("onlineList");
const total = document.getElementById("total");

onValue(ref(db, "online"), (snapshot) => {
    onlineList.innerHTML = "";
    let count = 0;

    snapshot.forEach(child => {
        let u = child.val();
        count++;

        let div = document.createElement("div");
        div.innerHTML = `
            <span><span class="dot"></span>${u.name}</span>
            <span>${u.device} | ${u.time}</span>
        `;

        onlineList.appendChild(div);
    });

    total.innerText = count;
});
</script>

</body>
</html>
