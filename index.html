<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kxkxpxa</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Segoe UI', Arial;
    color: white;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #4facfe, #a18cd1);
    display: flex;
    justify-content: center;
}

/* LOGIN */
#loginUI {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at top, #4facfe, #6a5acd, #000);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.login-box {
    text-align: center;
    background: rgba(255,255,255,0.08);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(255,255,255,0.2);
}

/* nút thường */
.login-box button {
    padding: 12px 25px;
    border-radius: 12px;
    border: none;
    background: white;
    color: #333;
    cursor: pointer;
}

/* GOOGLE BUTTON */
.login-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
    padding: 12px;
    border-radius: 12px;
    background: white;
    color: #333;
    cursor: pointer;
}

.login-google img {
    width: 22px;
}

/* hiệu ứng bấm */
.login-google:active,
.login-box button:active,
.box:active {
    transform: scale(0.95);
    box-shadow: 0 0 15px white;
}

/* MAIN */
.container {
    width: 100%;
    max-width: 900px;
    display: none;
}

.header {
    text-align: center;
    padding: 20px;
    font-size: 25px;
    font-weight: bold;
    background: rgba(255,255,255,0.1);
}

/* SEARCH */
#search {
    width: 85%;
    margin: 15px auto;
    display: block;
    padding: 10px;
    border-radius: 20px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: white;
    text-align: center;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    padding: 15px;
}

@media (min-width: 768px) {
    .grid {
        grid-template-columns: 1fr 1fr;
    }
}

/* BOX */
.box {
    background: rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 18px;
    text-align: center;
    cursor: pointer;
}

/* CHAT */
#chatBox {
    margin: 20px;
    padding: 15px;
    background: rgba(0,0,0,0.25);
    border-radius: 15px;
}

#messages {
    max-height: 200px;
    overflow-y: auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginUI">
    <div class="login-box">
        <h2>Đăng nhập</h2>

        <!-- nút Google -->
        <div class="login-google" onclick="loginGoogle()">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
            <span>Đăng nhập bằng Google</span>
        </div>
    </div>
</div>

<!-- MAIN -->
<div class="container" id="mainUI">
<div class="header">QUIN DEVELOPER</div>

<input type="text" id="search" placeholder="🔍 Tìm nhanh..">
<div class="grid" id="grid"></div>

<div id="chatBox">
    <h3>💬 Chat tổng</h3>
    <input id="name" placeholder="Tên..." style="width:30%">
    <input id="msg" placeholder="Nhập tin..." style="width:50%">
    <button onclick="sendMsg()">Gửi</button>
    <div id="messages"></div>
</div>
</div>

<script>
let links = ["google.com","youtube.com","facebook.com"];

let grid = document.getElementById("grid");

links.forEach(name => {
    let div = document.createElement("div");
    div.className = "box";
    div.innerText = name;
    div.onclick = () => window.open("https://" + name);
    grid.appendChild(div);
});

document.getElementById("search").addEventListener("input", () => {
    let keyword = document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".box").forEach(box => {
        box.style.display = box.innerText.toLowerCase().includes(keyword) ? "" : "none";
    });
});
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCoGH-211UP_6o5eqoL4bq6DI4VbzXTKJ0",
  authDomain: "check-user-1.firebaseapp.com",
  projectId: "check-user-1",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.loginGoogle = async function() {
    const result = await signInWithPopup(auth, provider);
};

onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById("loginUI").style.display = "none";
        document.getElementById("mainUI").style.display = "block";
    } else {
        document.getElementById("loginUI").style.display = "flex";
    }
});
</script>

</body>
</html>
