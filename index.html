<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tundevlo</title>
<link rel="icon" href="web.png?v=1" type="image/png">

<style>
:root {
    --bg-gradient: linear-gradient(135deg, #4facfe 0%, #6a5acd 100%);
    --primary-color: #4facfe; 
    --text-main: #ffffff;
    --text-sub: rgba(255, 255, 255, 0.7);
    --glass-bg: rgba(255, 255, 255, 0.12);
    --glass-border: rgba(255, 255, 255, 0.2);
    --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.2);
}

body { 
    display: none; margin: 0; min-height: 100vh; font-family: 'Segoe UI', sans-serif; 
    background: var(--bg-gradient); background-attachment: fixed; color: var(--text-main);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

#loginUI, #mainUI, #logoutConfirmUI, .page-section { display: none; }
.active-page { display: block !important; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* LOGIN */
#loginUI { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(15px); }
.login-box { text-align: center; background: var(--glass-bg); padding: 40px; border-radius: 30px; border: 1px solid var(--glass-border); width: 85%; max-width: 340px; box-shadow: var(--shadow-soft); }

.container { width: 100%; max-width: 480px; margin: 0 auto; padding: 20px 15px 120px; }
.header-box { text-align: center; padding: 15px; font-size: 18px; font-weight: 800; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; color: white; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

/* NAVIGATION */
.nav-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 65px; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; border-radius: 25px; z-index: 1500; box-shadow: var(--shadow-soft); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-sub); cursor: pointer; transition: 0.3s; }
.nav-item.active { color: var(--primary-color); transform: translateY(-3px); }
.nav-text { font-size: 9px; font-weight: 800; text-transform: uppercase; }
.nav-icon-img { width: 24px; height: 24px; object-fit: contain; }

#search { width: 100%; padding: 14px; border-radius: 30px; border: 1px solid var(--glass-border); background: var(--glass-bg); text-align: center; outline: none; margin-bottom: 20px; font-size: 14px; color: white; }

/* GRID TỰ ĐỘNG CHIA CỘT */
.grid { 
    display: grid; 
    grid-template-columns: 1fr; /* Mặc định 1 cột cho điện thoại */
    gap: 12px; 
}

/* KHI MÀN HÌNH RỘNG (PC) */
@media (min-width: 768px) {
    .grid {
        grid-template-columns: 1fr 1fr; /* Tự động chia 2 cột khi trên PC */
        gap: 15px;
    }
}

.box { 
    background: var(--glass-bg); 
    border-radius: 18px; 
    padding: 20px 15px; 
    text-align: center; 
    border: 1px solid var(--glass-border); 
    cursor: pointer; 
    font-weight: 600; 
    transition: 0.4s; 
    font-size: 15px; 
    color: white; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    display: flex; /* Thêm cái này để chữ luôn ở giữa */
    align-items: center;
    justify-content: center;
    min-height: 60px;
}

.box:hover { background: rgba(255,255,255,0.25); transform: scale(1.02); }

/* CHAT */
.chat-container { background: var(--glass-bg); border-radius: 25px; border: 1px solid var(--glass-border); padding: 15px; height: 60vh; display: flex; flex-direction: column; }
#messages { flex: 1; overflow-y: auto; }
.msg-item { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 15px; margin-bottom: 8px; border: 1px solid var(--glass-border); max-width: 90%; }
.msg-user { color: #ffffff !important; font-weight: 800; font-size: 12px; margin-bottom: 2px; display: block; }
.msg-text { font-size: 13px; color: white; }
.msg-time { font-size: 9px; opacity: 0.5; margin-top: 4px; text-align: right; }
.chat-input-row { display: flex; gap: 8px; margin-top: 10px; }
.chat-input-row input { flex: 1; padding: 12px 15px; border-radius: 20px; border: none; background: white; outline: none; color: #333; }
.chat-input-row button { padding: 0 20px; border-radius: 20px; border: none; background: var(--primary-color); color: white; font-weight: 700; }

/* ADMIN & PROFILE */
.admin-card { background: var(--glass-bg); border-radius: 20px; padding: 15px; border: 1px solid var(--glass-border); }
.admin-table { width: 100%; border-collapse: collapse; color: white; }
.admin-table td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

/* LIST LOGS */
.log-item { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 14px; text-align: left; }
.log-item:last-child { border-bottom: none; }
.log-name { font-weight: 800; color: white; }
.log-time { color: var(--text-sub); font-size: 13px; }

.profile-card { background: var(--glass-bg); border-radius: 25px; padding: 30px 20px; text-align: center; border: 1px solid var(--glass-border); }
.avatar-circle { width: 75px; height: 75px; background: var(--primary-color); border-radius: 50%; margin: 0 auto 15px; border: 3px solid white; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 800; overflow: hidden; }
.role-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 11px; font-weight: 800; margin-top: 15px; text-transform: uppercase; }
.role-admin { background: white; color: #6a5acd; }
.role-user { background: rgba(255,255,255,0.1); color: white; }

.profile-logout-btn { margin-top: 20px; width: 100%; padding: 16px; border-radius: 25px; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border); color: #ff4d4d; font-weight: 800; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

/* MODALS */
#logoutConfirmUI, #bannedModal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); display:none; justify-content: center; align-items: center; z-index: 2100; }
.confirm-card { background: #2a344a; padding: 30px; border-radius: 30px; text-align: center; width: 300px; color: white; }
</style>
</head>

<body>

<div id="loginUI">
    <div class="login-box">
        <h2 style="color: white; margin:0;">devlo 🐧</h2>
        <div class="login-google" style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 25px; padding: 12px; border-radius: 15px; cursor: pointer; font-weight: 700; background: white; color: #333;" onclick="loginGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google
        </div>
    </div>
</div>

<div class="container" id="mainUI">
    <div id="page-home" class="page-section active-page">
        <div class="header-box">quin developer</div>
        <input type="text" id="search" placeholder="🔍 Tìm nhanh..">
        <div class="grid" id="grid"></div>
    </div>

    <div id="page-chat" class="page-section">
        <div class="header-box">ntin</div>
        <div class="chat-container">
            <div id="messages"></div>
            <div class="chat-input-row">
                <input id="msgInput" placeholder="Aa..">
                <button onclick="sendMsg()">Gửi</button>
            </div>
        </div>
    </div>

    <div id="page-admin" class="page-section">
        <div class="header-box">Admin quin</div>
        <div style="margin-bottom: 10px; font-weight: 800; color: #ffffff; font-size: 14px; text-align: left; padding-left: 10px;">BẢNG XẾP HẠNG</div>
        <div class="admin-card" style="margin-bottom: 25px;">
            <table class="admin-table">
                <tbody id="scoreTableBody"></tbody>
            </table>
        </div>
        <div style="margin-bottom: 10px; font-weight: 800; color: #ffffff; font-size: 14px; text-align: left; padding-left: 10px;"> LỊCH SỬ DN</div>
        <div class="admin-card" style="max-height: 250px; overflow-y: auto; padding: 0;">
            <div id="logList"></div>
        </div>
    </div>

    <div id="page-profile" class="page-section">
        <div class="header-box">Tài Khoản</div>
        <div class="profile-card">
            <div class="avatar-circle" id="user-avatar">?</div>
            <h3 id="user-display-name" style="margin: 5px 0; color: white;">---</h3>
            <p id="user-display-email" style="color: var(--text-sub); margin: 0; font-size: 13px;">---</p>
            <div id="user-role-badge" class="role-badge">---</div>
        </div>
        <div class="profile-logout-btn" onclick="openLogoutModal()">
            <img src="logout1.png" width="20"> Đăng xuất
        </div>
    </div>
</div>

<div class="nav-bar" id="navBar">
    <div class="nav-item active" onclick="switchTab('home', this)">
        <img src="home1.png" class="nav-icon-img">
        <span class="nav-text">Home</span>
    </div>
    <div class="nav-item" onclick="switchTab('chat', this)">
        <img src="chat1.png" class="nav-icon-img">
        <span class="nav-text">chattg</span>
    </div>
    <div class="nav-item" id="nav-admin" onclick="switchTab('admin', this)" style="display:none;">
        <img src="admin1.png" class="nav-icon-img">
        <span class="nav-text">Admin</span>
    </div>
    <div class="nav-item" onclick="switchTab('profile', this)">
        <img src="caidat1.png" class="nav-icon-img">
        <span class="nav-text">Tôi</span>
    </div>
</div>

<div id="logoutConfirmUI">
    <div class="confirm-card">
        <h3>Đăng xuất?</h3>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeLogoutModal()" style="flex:1; padding:10px; border-radius:10px; border:none; background:#eee; color:#333; font-weight:bold;">huy</button>
            <button onclick="executeLogout()" style="flex:1; padding:10px; border-radius:10px; border:none; background:#ff4d4d; color:white; font-weight:bold;">dang xuat</button>
        </div>
    </div>
</div>

<div id="bannedModal">
    <div class="confirm-card">
        <h3>Thông báo</h3>
        <p id="bannedMessage" style="color: #bdc3c7; line-height: 1.5; margin-bottom: 25px; font-size: 14px;"></p>
        <button onclick="window.location.reload()" style="background: #ff4757; color: white; border: none; padding: 12px; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer;">Đã hiểu</button>
    </div>
</div>

<script type="module" src="main.js"></script>
</script>
</body>
</html>
