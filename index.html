<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tooltraffic</title>

<link rel="stylesheet" href="main.css">
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial;
    color: white;
}

/* ✅ nền mượt + không lỗi khi scroll/search */
body {
    min-height: 100vh;
    background: linear-gradient(180deg, #6fbaff, #b388ff);
    background-attachment: fixed;

    display: flex;
    justify-content: center;
}

/* 📦 khung cho PC */
.container {
    width: 100%;
    max-width: 900px;
}

/* HEADER */
.header {
    text-align: center;
    padding: 20px;
    font-size: 22px;
    font-weight: bold;

    background: rgba(255,255,255,0.08);
    border-bottom: 1px solid rgba(255,255,255,0.2);

    text-shadow: 0 0 10px #fff;
}

/* SEARCH */
#search {
    width: 85%;
    margin: 15px auto;
    display: block;
    padding: 10px;
    border-radius: 12px;
    border: none;
    outline: none;

    background: rgba(255,255,255,0.12);
    color: white;
    text-align: center;
}

/* ✅ GRID chỉnh lại */
.grid {
    display: grid;
    grid-template-columns: 1fr; /* mobile 1 cột */
    gap: 12px;
    padding: 15px;
}

/* 📺 PC: 2 cột */
@media (min-width: 768px) {
    .grid {
        grid-template-columns: 1fr 1fr;
    }
}

/* BOX */
.box {
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    cursor: pointer;

    border: 1px solid rgba(255,255,255,0.15);

    transition: 0.2s;
    font-size: 13px;
    word-break: break-all;

}
</style>
</head>

<body>

<div class="container">

<div class="header">QUIN DEVELOPER</div>

<input type="text" id="search" placeholder="🔍 Tìm nhanh...">

<div class="grid" id="grid"></div>

</div>

<script>

];

// SITE LIST
let useSiteList = [
"comtech.za.com",

"n188-n188.site",
"when.it.com",

];

// SEARCH GOOGLE
function searchGoogle(domain) {
    domain = domain.trim();

    let keyword = useSiteList.includes(domain)
        ? "site:" + domain + " " + domain
        : domain;

    let url = "https://www.google.com/search?q=" + encodeURIComponent(keyword);
    window.location.href = url;
}

// RENDER
let grid = document.getElementById("grid");

links.forEach(name => {
    let div = document.createElement("div");
    div.className = "box";
    div.innerText = name;

    div.onclick = () => searchGoogle(name);

    grid.appendChild(div);
});

// FILTER
let search = document.getElementById("search");

search.addEventListener("input", () => {
    let keyword = search.value.toLowerCase().trim();
    let boxes = document.querySelectorAll(".box");

    boxes.forEach(box => {
        let text = box.innerText.toLowerCase();
        box.style.display = text.includes(keyword) ? "" : "none";
    });
});

</script>

</body>
</html>
