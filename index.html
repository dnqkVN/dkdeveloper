<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirect Admin</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

.box{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#334155;
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    color:black;
    font-weight:bold;
}

pre{
    background:#020617;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
    overflow:auto;
}
</style>
</head>
<body>

<div class="box">

<h2>Redirect Admin</h2>

<input id="key" placeholder="VD: 97-2">

<input id="domain" placeholder="VD: open882.net">

<button onclick="saveData()">Lưu Link</button>

<pre id="view"></pre>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCoGH-211UP_6o5eqoL4bq6DI4VbzXTKJ0",
  authDomain: "check-user-1.firebaseapp.com",
  databaseURL: "https://check-user-1-default-rtdb.firebaseio.com",
  projectId: "check-user-1",
  storageBucket: "check-user-1.firebasestorage.app",
  messagingSenderId: "1009556670498",
  appId: "1:1009556670498:web:4df83dfa4b2314c21d227b",
  measurementId: "G-5EEYKNYP3D"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

window.saveData = function(){

    const key =
        document.getElementById("key").value.trim();

    const domain =
        document.getElementById("domain").value.trim();

    if(!key || !domain){

        alert("Nhập thiếu");

        return;

    }

    set(
        ref(db,"redirects/" + key),
        domain
    );

    alert("Đã lưu");

}

onValue(ref(db,"redirects"), (snapshot)=>{

    document.getElementById("view")
    .textContent =
        JSON.stringify(snapshot.val(),null,4);

});

</script>

</body>
</html>
