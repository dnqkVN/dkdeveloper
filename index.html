<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tundevlo</title>
<link rel="icon" href="web.png" type="image/png">

<style>
:root {
    --bg-gradient: linear-gradient(135deg, #4facfe 0%, #6a5acd 100%);
    --primary-color: #4facfe; 
    --text-main: #ffffff;
    --text-sub: rgba(255, 255, 255, 0.7);
    --glass-bg: rgba(255, 255, 255, 0.12);
    --glass-border: rgba(255, 255, 255, 0.2);
    --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.2);
}

/* FIX CHỐNG NHÁY: Ẩn body ngay từ đầu */
body { 
    display: none; 
    margin: 0; min-height: 100vh; font-family: 'Segoe UI', sans-serif; 
    background: var(--bg-gradient); background-attachment: fixed; color: var(--text-main);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

#loginUI, #mainUI, #logoutConfirmUI, .page-section { display: none; }
.active-page { display: block !important; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* LOGIN */
#loginUI { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(15px); }
.login-box { text-align: center; background: var(--glass-bg); padding: 40px; border-radius: 30px; border: 1px solid var(--glass-border); width: 85%; max-width: 340px; box-shadow: var(--shadow-soft); }

.container { width: 100%; max-width: 480px; margin: 0 auto; padding: 20px 15px 120px; }
.header-box { 
    text-align: center; padding: 15px; font-size: 18px; font-weight: 800; background: var(--glass-bg); 
    border: 1px solid var(--glass-border); border-radius: 20px; color: white; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; 
}

/* NAVIGATION */
.nav-bar { 
    position: fixed; bottom: 20px; left: 20px; right: 20px; height: 65px; background: rgba(0, 0, 0, 0.3); 
    backdrop-filter: blur(20px); border: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; 
    border-radius: 25px; z-index: 1500; box-shadow: var(--shadow-soft); 
}
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-sub); cursor: pointer; transition: 0.3s; }
.nav-item.active { color: var(--primary-color); transform: translateY(-3px); }
.nav-text { font-size: 9px; font-weight: 800; text-transform: uppercase; }

/* SEARCH & GRID */
#search { 
    width: 100%; padding: 14px; border-radius: 30px; border: 1px solid var(--glass-border); 
    background: var(--glass-bg); text-align: center; outline: none; margin-bottom: 15px; font-size: 14px; color: white; 
}
#search::placeholder { color: rgba(255,255,255,0.5); }
.grid { display: flex; flex-direction: column; gap: 10px; }
.box { 
    background: var(--glass-bg); border-radius: 15px; padding: 18px; text-align: center; 
    border: 1px solid var(--glass-border); cursor: pointer; font-weight: 600; transition: 0.3s; font-size: 14px; color: white; 
}
.box:hover { background: rgba(255,255,255,0.25); transform: scale(1.02); }

/* CHAT CẢI TIẾN */
.chat-container { background: var(--glass-bg); border-radius: 25px; border: 1px solid var(--glass-border); padding: 15px; height: 60vh; display: flex; flex-direction: column; }
#messages { flex: 1; overflow-y: auto; padding-right: 5px; }
.msg-item { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 15px; margin-bottom: 8px; border: 1px solid var(--glass-border); max-width: 90%; }
/* Tên người dùng màu trắng cho dễ nhìn trên nền tối */
.msg-user { 
    color: #ffffff !important; 
    font-weight: 800; 
    font-size: 12px; 
    margin-bottom: 2px; 
    display: block; 
    text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
}
.msg-text { font-size: 13px; color: white; }
.msg-time { font-size: 9px; opacity: 0.5; margin-top: 4px; text-align: right; }
.chat-input-row { display: flex; gap: 8px; margin-top: 10px; }
.chat-input-row input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.95); outline: none; color: #333; }
.chat-input-row button { padding: 0 18px; border-radius: 20px; border: none; background: var(--primary-color); color: white; font-weight: 700; cursor: pointer; }

/* PROFILE */
.profile-card { background: var(--glass-bg); border-radius: 25px; padding: 30px 20px; text-align: center; border: 1px solid var(--glass-border); }
.avatar-circle { width: 75px; height: 75px; background: var(--primary-color); border-radius: 50%; margin: 0 auto 15px; border: 3px solid white; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 800; overflow: hidden; }
.role-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 11px; font-weight: 800; margin-top: 15px; text-transform: uppercase; }
.role-admin { background: white; color: #6a5acd; border: 1px solid white; }
.role-user { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--glass-border); }

/* NÚT ĐĂNG XUẤT MỚI TRONG TRANG PROFILE (HIỆU ỨNG KÍNH MỜ) */
.profile-logout-btn {
    margin-top: 20px;
    width: 100%;
    padding: 16px;
    border-radius: 25px; 
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    color: #ff4d4d;
    font-weight: 800;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: 0.3s;
    box-shadow: var(--shadow-soft);
}
.profile-logout-btn:hover {
    background: rgba(0, 0, 0, 0.5);
    transform: translateY(-2px);
    border-color: rgba(255, 77, 77, 0.5);
}

.admin-card { background: var(--glass-bg); border-radius: 20px; padding: 15px; border: 1px solid var(--glass-border); }
.admin-table { width: 100%; border-collapse: collapse; color: white; }
.admin-table th { text-align: left; padding: 10px; opacity: 0.7; border-bottom: 1px solid var(--glass-border); font-size: 13px; }
.admin-table td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

#logoutConfirmUI { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); display:none; justify-content: center; align-items: center; z-index: 2100; }
.confirm-card { background: #2a344a; padding: 30px; border-radius: 30px; text-align: center; width: 300px; color: white; }
</style>
</head>

<body>

<div id="loginUI">
    <div class="login-box">
        <h2 style="color: white; margin:0;">devlo 🐧</h2>
        <p style="color: var(--text-sub); font-size: 14px; margin-top: 8px;">ĐĂNG NHẬP BẰNG GOOGLE</p>
        <div class="login-google" style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 25px; padding: 12px; border-radius: 15px; cursor: pointer; font-weight: 700; background: white; color: #333;" onclick="loginGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google
        </div>
    </div>
</div>

<div class="container" id="mainUI">

    <div id="page-home" class="page-section active-page">
        <div class="header-box">quin developer</div>
        <input type="text" id="search" placeholder="🔍 Tìm nhanh..">
        <div class="grid" id="grid"></div>
    </div>

    <div id="page-chat" class="page-section">
        <div class="header-box">ntin</div>
        <div class="chat-container">
            <div id="messages"></div>
            <div class="chat-input-row">
                <input id="msgInput" placeholder="Aa..">
                <button onclick="sendMsg()">Gửi</button>
            </div>
        </div>
    </div>

    <div id="page-admin" class="page-section">
        <div class="header-box">Bảng Xếp Hạng</div>
        <div class="admin-card">
            <table class="admin-table">
                <thead><tr><th>Tên</th><th style="text-align:right">Điểm</th></tr></thead>
                <tbody id="scoreTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="page-profile" class="page-section">
        <div class="header-box">Tài Khoản</div>
        <div class="profile-card">
            <div class="avatar-circle" id="user-avatar">?</div>
            <h3 id="user-display-name" style="margin: 5px 0; color: white; font-size: 20px;">---</h3>
            <p id="user-display-email" style="color: var(--text-sub); margin: 0; font-size: 13px;">---</p>
            <div id="user-role-badge" class="role-badge">---</div>
        </div>
        
        <div class="profile-logout-btn" onclick="openLogoutModal()">
            <span style="font-size: 20px;">🚪</span> Đăng xuất
        </div>
    </div>
</div>

<div class="nav-bar" id="navBar">
    <div class="nav-item active" onclick="switchTab('home', this)">
        <span class="nav-icon">🏠</span><span class="nav-text">Home</span>
    </div>
    <div class="nav-item" onclick="switchTab('chat', this)">
        <span class="nav-icon">💬</span><span class="nav-text">chattg</span>
    </div>
    <div class="nav-item" id="nav-admin" onclick="switchTab('admin', this)" style="display:none;">
        <span class="nav-icon">💎</span><span class="nav-text">Admin</span>
    </div>
    <div class="nav-item" onclick="switchTab('profile', this)">
        <span class="nav-icon">👤</span><span class="nav-text">Tôi</span>
    </div>
</div>

<div id="logoutConfirmUI">
    <div class="confirm-card">
        <div style="font-size: 40px; margin-bottom: 10px;">👋</div>
        <h3 style="margin:0;">Đăng xuất?</h3>
        <div style="display:flex; gap:10px; margin-top:25px;">
            <button onclick="closeLogoutModal()" style="flex:1; padding:12px; border-radius:15px; border:none; background:rgba(255,255,255,0.1); color:white; cursor:pointer;">Hủy</button>
            <button onclick="executeLogout()" style="flex:1; padding:12px; border-radius:15px; border:none; background:#ff4d4d; color:white; font-weight:700; cursor:pointer;">Thoát</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, update, increment, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = { 
    apiKey: "AIzaSyCoGH-211UP_6o5eqoL4bq6DI4VbzXTKJ0", 
    authDomain: "check-user-1.firebaseapp.com", 
    projectId: "check-user-1",
    databaseURL: "https://check-user-1-default-rtdb.firebaseio.com"
};
const app = initializeApp(firebaseConfig); const db = getDatabase(app); const auth = getAuth(app); const provider = new GoogleAuthProvider();

const ADMIN_EMAIL = "khangdoannq@gmail.com";
const userNames = {
    "qkhaang@gmail.com":"qk", "khangdoannq@gmail.com":"kdoan", "truongloi010220@gmail.com":"phát béo",
    "anddang15@gmail.com":"an", "truonghuuphat9991@gmail.com":"lọ dùm trai 6 múi",
    "anhkhoadn2009@gmail.com":"khoa", "tmai28298@gmail.com":"tmai", "12345vanthach@gmail.com":"nam"
};
const allowedEmails = Object.keys(userNames);
let currentEmail = "";

window.switchTab = (tabName, el) => {
    document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + tabName).classList.add('active-page');
    el.classList.add('active');
};

let links = ["desocu56dolecto.gb.net","789winn-789win.online","mmoo-trangchu.online","nk88-trangchu.online","open88vip1.online","555wingame.online","68winvipro01.online","riegrowtaimo.za.com","99win-site.online","f168viponline.com","vip66-vip1.online","33win-vip1.online","tg88-vip1.online","hz88-vn01.site","nk88-nk88.online","tg88-top1.online","88xx-top1.online","xn88-top1.online","x88top1.online","nohu-mobi.online","tg88-tg88.online","burirdred.za.com","x88-3.shop","pkwin2026.lat","derelle.gb.net","88xxcasino.com","888vicom.lat","tg88karik.online","68win10.store","rkmusics.in.net","n188-n188.site","x88-ka.online","c168-vn3.com","sc88-vn8.com","u888dani.com","c168uu.com","ae888t1.com","mb88vn.site"];

// BIẾN QUẢN LÝ THỜI GIAN NHẬN ĐIỂM
let scoreTimer = null; 

onAuthStateChanged(auth, u => {
    /* MỞ BODY: Ngay khi firebase xác nhận xong trạng thái login */
    document.body.style.display = "block";

    if(u && allowedEmails.includes(u.email)) {
        currentEmail = u.email;
        document.getElementById("loginUI").style.display = "none";
        document.getElementById("mainUI").style.display = "block";
        document.getElementById("navBar").style.display = "flex";
        
        const name = userNames[u.email];
        document.getElementById("user-display-name").innerText = name;
        document.getElementById("user-display-email").innerText = u.email;
        
        push(ref(db, 'logs'), { name: name, email: u.email, time: new Date().toLocaleString('vi-VN') });

        const badge = document.getElementById("user-role-badge");
        if(u.email === ADMIN_EMAIL) {
            badge.innerText = "💎 Quản trị viên";
            badge.className = "role-badge role-admin";
            document.getElementById("nav-admin").style.display = "flex";
        } else {
            badge.innerText = "Thành viên";
            badge.className = "role-badge role-user";
        }

        if(u.photoURL) {
            document.getElementById("user-avatar").innerHTML = `<img src="${u.photoURL}" style="width:100%; height:100%; object-fit:cover;">`;
        } else {
            document.getElementById("user-avatar").innerText = name.charAt(0).toUpperCase();
        }
        
        const grid = document.getElementById("grid"); grid.innerHTML = "";
        links.forEach(n => {
            let div = document.createElement("div"); div.className = "box"; div.innerText = n;
            div.onclick = () => {
                // Mở link trước
                window.open("https://www.google.com/url?q=https://" + n, "_blank");

                // Hủy bộ đếm cũ nếu có (Nhận nhiệm vụ mới thì cái cũ biến mất)
                if(scoreTimer) {
                    clearTimeout(scoreTimer);
                    console.log("Đã hủy nhiệm vụ cũ, bắt đầu đếm lại 80 giây...");
                }

                // Bắt đầu đếm ngược 80s (80000ms) theo yêu cầu
                scoreTimer = setTimeout(() => {
                    update(ref(db, 'scores/' + currentEmail.replace(/\./g, '_')), { points: increment(0.5), name: name });
                    alert("Chúc mừng! Bạn đã nhận được 0.5 điểm sau 80 giây.");
                    scoreTimer = null; 
                }, 80000); 
            };
            grid.appendChild(div);
        });

        onValue(ref(db, 'scores'), snap => {
            const body = document.getElementById("scoreTableBody"); body.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                body.innerHTML += `<tr><td>${d.name}</td><td style="text-align:right"><span style="background:var(--primary-color);color:white;padding:2px 8px;border-radius:8px;font-weight:800;font-size:12px;">${d.points.toFixed(1)}</span></td></tr>`;
            });
        });
    } else {
        if(u) signOut(auth);
        document.getElementById("loginUI").style.display = "flex";
        document.getElementById("mainUI").style.display = "none";
        document.getElementById("navBar").style.display = "none";
    }
});

window.loginGoogle = () => signInWithPopup(auth, provider);
window.openLogoutModal = () => document.getElementById("logoutConfirmUI").style.display = "flex";
window.closeLogoutModal = () => document.getElementById("logoutConfirmUI").style.display = "none";
window.executeLogout = () => signOut(auth).then(()=>window.location.reload());

window.sendMsg = () => {
    let msg = document.getElementById("msgInput").value;
    if(!msg) return;
    push(ref(db,"chat"), { name: currentEmail, msg: msg, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), timestamp: Date.now() });
    document.getElementById("msgInput").value="";
};

onChildAdded(ref(db,"chat"), s => {
    let m = s.val();
    let div = document.createElement("div"); div.className = "msg-item";
    div.innerHTML = `<span class="msg-user">${userNames[m.name]}</span><div class="msg-text">${m.msg}</div><div class="msg-time">${m.time}</div>`;
    const box = document.getElementById("messages"); box.appendChild(div); box.scrollTop = box.scrollHeight;
});

document.getElementById("search").addEventListener("input", e => {
    let kw = e.target.value.toLowerCase();
    document.querySelectorAll(".box").forEach(b => b.style.display = b.innerText.toLowerCase().includes(kw) ? "" : "none");
});
</script>

</body>
</html>
