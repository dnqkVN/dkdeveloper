<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tooltraffic</title>

<link rel="stylesheet" href="main.css">
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial;
    color: white;
}

body {
    min-height: 100vh;
    background: linear-gradient(180deg, #6fbaff, #b388ff);
    background-attachment: fixed;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 900px;
}

.header {
    text-align: center;
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
    background: rgba(255,255,255,0.08);
    border-bottom: 1px solid rgba(255,255,255,0.2);
    text-shadow: 0 0 10px #fff;
}

#search {
    width: 85%;
    margin: 15px auto;
    display: block;
    padding: 10px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.12);
    color: white;
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    padding: 15px;
}

@media (min-width: 768px) {
    .grid {
        grid-template-columns: 1fr 1fr;
    }
}

.box {
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.15);
    transition: 0.2s;
    font-size: 13px;
    word-break: break-all;
}

/* 🔥 CHAT STYLE */
#chatBox {
    margin: 20px;
    padding: 15px;
    background: rgba(0,0,0,0.2);
    border-radius: 12px;
}

#messages {
    max-height: 200px;
    overflow-y: auto;
    margin-top: 10px;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="container">
<div class="header">QUIN DEVELOPER</div>

<input type="text" id="search" placeholder="🔍 Tìm nhanh...">
<div class="grid" id="grid"></div>

<!-- 🔥 CHAT -->
<div id="chatBox">
    <h3>💬 Chat tổng</h3>
    <input id="name" placeholder="Tên..." style="width:30%">
    <input id="msg" placeholder="Nhập tin..." style="width:50%">
    <button onclick="sendMsg()">Gửi</button>
    <div id="messages"></div>
</div>

</div>

<script>
// DATA
let links = [
"college-stories.ru.com","mmoo-trangchu.online","nk88-trangchu.online","88xx-top1.online",
"nk88-nk88.online","comtech.za.com","n188-n188.site","tg88-vip1.online","hz88-site.online",
"c168uu.com","68win10.store","x88-ka.online","ae888t1.com","tt88vip1.online",
"americalibdotp.sa.com","galane.za.com","xn88-top1.online","hz88-vn01.site",
"99win-site.online","xn--lck0a5auxk.jp.net","joqzju.ru.com","open88vip1.online",
"555wingame.online","rjgruf.za.com","68win100.online","9xflixxx.it.com",
"qglqws.sa.com","vip66-vip1.online","rhucxo.za.com","33win-vip1.online",
"buukcb.za.com","x88top1.online","tg88-top1.online","nohu-mobi.online",
"tg88-tg88.online","c168-vipv.com","agen77bet.it.com","when.it.com",
"68winvipro01.online","twp.in.net"
];

let useSiteList = [
"comtech.za.com","68winvipro01.online","twp.in.net","nk88-nk88.online",
"n188-n188.site","when.it.com","x88-ka.online","galane.za.com","33win-vip1.online"
];

function searchGoogle(domain) {
    domain = domain.trim();

    let keyword = useSiteList.includes(domain)
        ? "site:" + domain + " " + domain
        : domain;

    let url = "https://www.google.com/search?q=" + encodeURIComponent(keyword);
    window.location.href = url;
}

let grid = document.getElementById("grid");

links.forEach(name => {
    let div = document.createElement("div");
    div.className = "box";
    div.innerText = name;
    div.onclick = () => searchGoogle(name);
    grid.appendChild(div);
});

let search = document.getElementById("search");

search.addEventListener("input", () => {
    let keyword = search.value.toLowerCase().trim();
    let boxes = document.querySelectorAll(".box");

    boxes.forEach(box => {
        let text = box.innerText.toLowerCase();
        box.style.display = text.includes(keyword) ? "" : "none";
    });
});
</script>

<!-- 🔥 FIREBASE FULL -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCoGH-211UP_6o5eqoL4bq6DI4VbzXTKJ0",
  authDomain: "check-user-1.firebaseapp.com",
  projectId: "check-user-1",
  storageBucket: "check-user-1.firebasestorage.app",
  messagingSenderId: "1009556670498",
  appId: "1:1009556670498:web:4df83dfa4b2314c21d227b",
  measurementId: "G-5EEYKNYP3D"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// detect device
let ua = navigator.userAgent;
let device = "PC";
if (/android/i.test(ua)) device = "Android";
else if (/iPhone|iPad/i.test(ua)) device = "iOS";

// lưu IP
fetch("https://api.ipify.org?format=json")
.then(res => res.json())
.then(data => {
    push(ref(db, "logs"), {
        ip: data.ip,
        device: device,
        ua: ua,
        time: new Date().toLocaleString()
    });
});

// 🔥 CHAT
window.sendMsg = function() {
    let name = document.getElementById("name").value || "Ẩn danh";
    let msg = document.getElementById("msg").value;

    if (!msg) return;

    push(ref(db, "chat"), {
        name: name,
        msg: msg,
        time: new Date().toLocaleTimeString()
    });

    document.getElementById("msg").value = "";
};

onChildAdded(ref(db, "chat"), (data) => {
    let m = data.val();

    let div = document.createElement("div");
    div.innerHTML = `<b>${m.name}</b>: ${m.msg} (${m.time})`;

    document.getElementById("messages").appendChild(div);
});
</script>

</body>
</html>
