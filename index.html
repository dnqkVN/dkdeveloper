<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, get, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, setPersistence, browserLocalPersistence, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCoGH-211UP_6o5eqoL4bq6DI4VbzXTKJ0",
  authDomain: "check-user-1.firebaseapp.com",
  projectId: "check-user-1",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const allowedEmails = [
"qkhaang@gmail.com","truongloi010220@gmail.com","anddang15@gmail.com","anhkhoadn2009@gmail.com"
];

// ================= LOGIN =================
window.loginGoogle = async function() {
    try {
        await setPersistence(auth, browserLocalPersistence);
        const result = await signInWithPopup(auth, provider);
        handleUser(result.user);
    } catch (e) {
        alert(e.message);
    }
};

function handleUser(user){
    if (allowedEmails.includes(user.email)) {
        document.getElementById("loginUI").style.display = "none";
        document.getElementById("mainUI").style.display = "block";
        renderLinks();
        cleanOldMessages(); // 🔥 chạy khi login
    } else {
        alert("ban khong co quyen");
        signOut(auth);
    }
}

onAuthStateChanged(auth, (user) => {
    if (user) {
        handleUser(user);
    } else {
        document.getElementById("loginUI").style.display = "flex";
    }
});

// ================= CHAT =================

// gửi tin
window.sendMsg = function(){
    let name = document.getElementById("name").value || "Ẩn danh";
    let msg = document.getElementById("msg").value;
    if(!msg) return;

    push(ref(db,"chat"),{
        name,
        msg,
        time:new Date().toLocaleTimeString(),
        timestamp: Date.now()
    });

    document.getElementById("msg").value="";
    cleanOldMessages(); // 🔥 xoá sau khi gửi
};

// nhận tin
onChildAdded(ref(db,"chat"),snap=>{
    let m=snap.val();
    let div=document.createElement("div");
    div.innerHTML=`<b>${m.name}</b>: ${m.msg} (${m.time})`;
    document.getElementById("messages").appendChild(div);
});

// ================= AUTO XOÁ 25H =================
const MAX_TIME = 25 * 60 * 60 * 1000;

function cleanOldMessages() {
    const now = Date.now();

    get(ref(db, "chat")).then(snapshot => {
        snapshot.forEach(child => {
            let data = child.val();

            if (data.timestamp && (now - data.timestamp > MAX_TIME)) {
                remove(ref(db, "chat/" + child.key));
            }
        });
    });
}

    // ================= ĐỒNG HỒ ĐẾM NGƯỢC =================
function updateCountdown() {
    const now = Date.now();
    const countdownEl = document.getElementById("countdown");

    get(ref(db, "chat")).then(snapshot => {
        let latestTime = 0;

        snapshot.forEach(child => {
            let data = child.val();
            if (data.timestamp && data.timestamp > latestTime) {
                latestTime = data.timestamp;
            }
        });

        if (latestTime === 0) {
            countdownEl.innerText = "(chưa có tin)";
            return;
        }

        let timeLeft = (latestTime + (2 * 60 * 60 * 60)) - now;

        if (timeLeft <= 0) {
            countdownEl.innerText = "(đang xoá...)";
            return;
        }

        let h = Math.floor(timeLeft / (1000 * 60 * 60));
        let m = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
        let s = Math.floor((timeLeft % (1000 * 60)) / 1000);

        countdownEl.innerText = `(${h}h ${m}m ${s}s)`;
    });
}

// 🔥 cập nhật mỗi giây
setInterval(updateCountdown, 1000);

// 🔥 tự chạy nền mỗi 10 phút
setInterval(cleanOldMessages, 10 * 60 * 1000);

// log IP (giữ nguyên của bạn)
fetch("https://api.ipify.org?format=json")
.then(r=>r.json())
.then(data=>{
    push(ref(db,"logs"),{
        ip:data.ip,
        time:new Date().toLocaleString()
    });
});
    </script>
